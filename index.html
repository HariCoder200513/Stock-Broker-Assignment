<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Stocks Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        #loading {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>US Stocks</h1>

    <div id="loading">Loading stock data...</div>

    <table>
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Company Name</th>
                <th>Sector</th>
                <th>Market Cap</th>
            </tr>
        </thead>
        <tbody id="stockTable"></tbody>
    </table>

    <script>
        async function loadStocks() {
            try {
                const response = await fetch(
                    "http://127.0.0.1:5000/stocks"
                );

                const stocks = await response.json();

                console.log(stocks);

                const table = document.getElementById("stockTable");
                table.innerHTML = "";

                stocks.forEach(stock => {
                    const row = `
                        <tr>
                            <td>${stock.ticker || "N/A"}</td>
                            <td>${stock.name || "N/A"}</td>
                            <td>${stock.sector || "N/A"}</td>
                            <td>${stock.market_cap?.toLocaleString() || "N/A"}</td>
                        </tr>
                    `;

                    table.innerHTML += row;
                });

                document.getElementById("loading").style.display = "none";

            } catch (error) {
                console.error(error);

                document.getElementById("loading").innerHTML =
                    "Failed to load stock data.";
            }
        }

        loadStocks();

        // Refresh every 60 seconds
        setInterval(loadStocks, 60000);
    </script>

</body>
</html>
